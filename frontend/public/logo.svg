<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!--
    Left circle:  center=(38,38), r=24, clockwise, arrow top-right
    Right circle: center=(82,44), r=28, counter-clockwise, arrow bottom-left
    Interlocked: left circle's right side is IN FRONT of right circle's left side
    Stroke-width=13, round caps, color=#C85A2A, no fill, transparent bg
  -->

  <!-- RIGHT circle BACK (left half, behind left circle) -->
  <path d="M 82,16 A 28,28 0 0 0 82,72"
        fill="none" stroke="#C85A2A" stroke-width="13" stroke-linecap="round"/>

  <!-- LEFT circle FULL clockwise ~300°, gap at top-right for arrow -->
  <!-- center(38,38) r=24: start ~(58,28) clockwise large-arc to ~(53,58) -->
  <path d="M 58,27 A 24,24 0 1 1 52,59"
        fill="none" stroke="#C85A2A" stroke-width="13" stroke-linecap="round"/>
  <!-- Arrowhead: clockwise direction at end ~(52,59) → pointing down-right -->
  <polyline points="44,56 52,61 56,53"
            fill="none" stroke="#C85A2A" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT circle FRONT (right half, in front of left circle) -->
  <path d="M 82,72 A 28,28 0 0 0 82,16"
        fill="none" stroke="#C85A2A" stroke-width="13" stroke-linecap="round"/>
  <!-- Arrowhead: CCW at top(82,16) → pointing upper-left -->
  <polyline points="90,22 82,15 74,22"
            fill="none" stroke="#C85A2A" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
